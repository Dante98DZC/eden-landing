      // ── Auth token (Supabase Auth) ─────────────────────────────────
      let _authToken = null;
      function setAuthToken(token) {

      }
      function getAuthToken() {

      // ── WhatsApp helper ────────────────────────────────────────────
      const DEFAULT_WHATSAPP = "1234567890";
      function buildWhatsappUrl(number, text) {
        const phone = (number || DEFAULT_WHATSAPP).replace(/[^0-9]+/g, "");
        return text
          ? `https://wa.me/${phone}?text=${encodeURIComponent(text)}`
          : `https://wa.me/${phone}`;
      }

      // ── Helper para hacer requests a Supabase REST API ─────────────
      async function supabaseRequest(method, path, body = null) {
        const url = `${SUPABASE_URL}/rest/v1/${path}`;
        const token = getAuthToken() || SUPABASE_ANON_KEY;

        const headers = {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${token}`,
          Prefer: "return=representation",
        };

        const config = { method, headers };
        if (body) config.body = JSON.stringify(body);

        const res = await fetch(url, config);
        const text = await res.text();

        if (!res.ok) {
          throw new Error(`Supabase (${res.status}): ${text}`);
        }

        try {
          return text ? JSON.parse(text) : null;
        } catch {
          return text;
        }
      }

      // ── Supabase Storage upload ────────────────────────────────────
      async function uploadToSupabaseBucket(file) {
        const ext = file.name.split(".").pop() || "jpg";
        const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
        const token = getAuthToken() || SUPABASE_ANON_KEY;

        const res = await fetch(
          `${SUPABASE_URL}/storage/v1/object/product-images/${fileName}`,
          {
            method: "POST",
            headers: {
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${token}`,
              "Content-Type": file.type || "application/octet-stream",
              "x-upsert": "true",
            },
            body: file,
          }
        );

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Storage error (${res.status}): ${err}`);
        }

        return `${SUPABASE_URL}/storage/v1/object/public/product-images/${fileName}`;
      }

      // ── ImageUploader component ────────────────────────────────────
      function ImageUploader({ value, onChange }) {
        const [uploading, setUploading] = useState(false);
        const [error, setError] = useState("");
        const fileRef = React.useRef(null);

        const handleFile = async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          setUploading(true);
          setError("");
          try {
            const url = await uploadToSupabaseBucket(file);
            onChange(url);
          } catch (err) {
            setError(err.message || "Error al subir imagen");
          } finally {
            setUploading(false);
            // Reset input so same file can be re-selected
            if (fileRef.current) fileRef.current.value = "";
          }
        };

        return h(
          "div",
          { style: { display: "flex", flexDirection: "column", gap: "8px" } },
          h(
            "div",
            { style: { display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" } },

                style: {

              h("input", {
                ref: fileRef,
                type: "file",
                accept: "image/*",
                style: { display: "none" },
                disabled: uploading,
                onChange: handleFile,
              }),

            value &&

                src: value,
                alt: "preview",
                style: {
                  width: "48px",
                  height: "48px",
                  objectFit: "cover",
                  borderRadius: "6px",
                  border: "1px solid var(--border)",

              }),
          ),
          error && h("div", { style: { color: "#C9667A", fontSize: "12px" } }, error),
          h("input", {
            className: "form-input",
            value: value,
            onChange: (e) => onChange(e.target.value),
            placeholder: "O pega una URL de imagen...",
            style: { marginTop: "0" },
          }),
        );
      }

      // Normaliza un producto: limpia campos que no existen en la DB
      function normalizeProduct(p) {
        const { desc, category_id, ...rest } = p;
        return { ...rest, description: p.description || desc || "" };
      }

      // Prepara un producto para enviar a Supabase (solo campos válidos de la tabla)
      function sanitizeProduct(p) {
        return {
          name: p.name,
          category: p.category,
          price: p.price,
          description: p.description || "",
          image_url: p.image_url || "",
          featured: !!p.featured,
          soldOut: !!p.soldOut,
          ...(p.position !== undefined && { position: p.position }),
        };
      }

      async function loadData() {
        try {
          const [products, news, config, categories] = await Promise.all([
            supabaseRequest("GET", "products?order=position.asc,id.asc"),
            supabaseRequest("GET", "news?order=date.desc"),
            supabaseRequest("GET", "site_config"),
            supabaseRequest("GET", "categories?order=name.asc"),
          ]);

          let whatsappNumber = DEFAULT_WHATSAPP;
          let hero = DEFAULT_HERO;

          if (Array.isArray(config)) {
            config.forEach((item) => {
              if (item.key === "whatsapp_number") whatsappNumber = item.value;
              if (item.key === "hero" && item.value) hero = item.value;
            });
          }

          return {
            products: (products || []).map(normalizeProduct),
            news: news || [],
            whatsappNumber,
            categories: categories || [],
            hero,
          };
        } catch (error) {
          throw error;
        }
      }

      // Guarda un solo ítem (product, news o category)
      // action: 'save' | 'delete'
      async function saveItem(table, item, action = "save") {
        if (action === "delete") {
          return supabaseRequest("DELETE", `${table}?id=eq.${item.id}`);
        }
        const { id, ...rest } = item;
        // Para productos, filtrar solo los campos que existen en la tabla
        const body = table === "products" ? sanitizeProduct(rest) : rest;
        if (id) {
          return supabaseRequest("PATCH", `${table}?id=eq.${id}`, body);
        } else {
          const result = await supabaseRequest("POST", table, body);
          return result?.[0] || result;
        }
      }

      async function saveConfig(key, value) {
        try {
          await supabaseRequest("PATCH", `site_config?key=eq.${key}`, {

          });
        } catch {
          await supabaseRequest("POST", "site_config", { key, value });
        }
      }

      // ── Date helpers ──────────────────────────────────────────────
      function formatDate(d) {
        try {
          const dt = new Date(d);
          if (isNaN(dt)) return d;
          return dt.toLocaleDateString("es-ES", {
            day: "numeric",
            month: "short",
            year: "numeric",
          });
        } catch {
          return d;
        }
      }
      function toISODate(d) {
        try {
          const dt = new Date(d);
          if (isNaN(dt)) return new Date().toISOString().slice(0, 10);
          return dt.toISOString().slice(0, 10);
        } catch {
          return new Date().toISOString().slice(0, 10);
        }
      }

      // ── LOGIN (Supabase Auth) ──────────────────────────────────────
      function Login({ setPage }) {
        const [email, setEmail] = useState("");
        const [pass, setPass] = useState("");
        const [err, setErr] = useState("");
        const [loading, setLoading] = useState(false);
        const submit = async () => {
          if (!email.trim() || !pass.trim()) {
            setErr("Ingresa email y contraseña");
            return;
          }
          setLoading(true);
          setErr("");
          try {
            const res = await fetch(
              `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  apikey: SUPABASE_ANON_KEY,
                },
                body: JSON.stringify({ email, password: pass }),
              },
            );
            const data = await res.json();
            if (!res.ok || !data.access_token) {
              setErr(
                data.error_description ||
                  data.msg ||
                  "Credenciales incorrectas",
              );
              return;
            }
            setAuthToken(data.access_token);
            setPage("admin");
          } catch {
            setErr("Error de conexión. Intenta de nuevo.");
          } finally {
            setLoading(false);
          }
        };
        return h(
          "div",
          { className: "login-wrap" },
          h(
            "div",
            { className: "login-card" },
            h("div", { className: "login-logo" }, "Sweet Eden"),
            h("div", { className: "login-sub" }, "Panel de administración"),
            err && h("div", { className: "login-error" }, err),
            h(
              "div",
              { className: "form-group" },
              h("label", { className: "form-label" }, "Email"),
              h("input", {
                className: "form-input",
                type: "email",
                value: email,
                onChange: (e) => setEmail(e.target.value),
                placeholder: "Email",
              }),
            ),
            h(
              "div",
              { className: "form-group" },
              h("label", { className: "form-label" }, "Contraseña"),
              h("input", {
                className: "form-input",
                type: "password",
                value: pass,
                onChange: (e) => setPass(e.target.value),
                onKeyDown: (e) => e.key === "Enter" && submit(),
                placeholder: "Contraseña",
              }),
            ),
            h(
              "button",
              {
                className: "btn-save",
                style: { width: "100%" },
                disabled: loading,
                onClick: submit,
              },
              loading ? "Entrando..." : "Entrar",
            ),
            h(
              "div",
              { style: { textAlign: "center", marginTop: "1rem" } },
              h(
                "button",
                { className: "btn-cancel", onClick: () => setPage("home") },
                "← Volver al sitio",
              ),
            ),
          ),
        );
      }

      // ── ADMIN PANEL ───────────────────────────────────────────────
      function Admin({ data, setData, setPage }) {
        const {
          products,
          news,
          whatsappNumber = "",
          categories = [],
          hero = {},
        } = data;
        const [whatsapp, setWhatsapp] = useState(whatsappNumber || "");
        const [heroData, setHeroData] = useState(hero || DEFAULT_HERO);
        const [categoriesData, setCategoriesData] = useState(categories || []);
        const [tab, setTab] = useState("products");
        const [editP, setEditP] = useState(null);
        const [editN, setEditN] = useState(null);
        const [editC, setEditC] = useState(null);
        const [showFormP, setShowFormP] = useState(false);
        const [showFormN, setShowFormN] = useState(false);
        const [showFormC, setShowFormC] = useState(false);
        const [saving, setSaving] = useState(false);
        const [toast, setToast] = useState("");
        useEffect(() => {
          setWhatsapp(whatsappNumber || "");
          setHeroData(hero || DEFAULT_HERO);
          setCategoriesData(categories || []);
        }, [whatsappNumber, hero, categories]);

        const showToast = (msg) => {
          setToast(msg);
          setTimeout(() => setToast(""), 2400);
        };

        // Wrapper genérico: ejecuta fn async, maneja saving/error
        const withSaving = async (fn) => {
          setSaving(true);
          try {
            await fn();
          } catch (e) {
            showToast(
              "❌ Error al guardar: " + (e?.message || "Revisa tu conexión."),
            );
          } finally {
            setSaving(false);
          }
        };

        const saveWhatsapp = async () => {
          if (!whatsapp.trim()) {
            showToast("⚠ Ingresa un número de WhatsApp");
            return;
          }
          await withSaving(async () => {
            await saveConfig("whatsapp_number", whatsapp.trim());
            setData((d) => ({ ...d, whatsappNumber: whatsapp.trim() }));
            showToast("✓ Número de WhatsApp guardado");
          });
        };

        const saveHero = async () => {
          if (!heroData.tag.trim()) {
            showToast("⚠ La etiqueta superior es requerida");
            return;
          }
          if (!heroData.title.trim()) {
            showToast("⚠ El título es requerido");
            return;
          }
          if (!heroData.subtitle.trim()) {
            showToast("⚠ El subtítulo es requerido");
            return;
          }
          const validFloats = heroData.floats.filter(
            (f) => f.icon && f.text.trim(),
          );
          if (validFloats.length === 0) {
            showToast(
              "⚠ Al menos un elemento destacado debe tener icono y texto",
            );
            return;
          }
          await withSaving(async () => {
            await saveConfig("hero", heroData);
            setData((d) => ({ ...d, hero: heroData }));
            showToast(
              "✓ Sección Hero actualizada (" +
                validFloats.length +
                " elementos)",
            );
          });
        };

        const updateHeroFloat = (index, field, value) => {
          const newFloats = [...heroData.floats];
          newFloats[index] = { ...newFloats[index], [field]: value };
          setHeroData({ ...heroData, floats: newFloats });
        };

        const addHeroFloat = () => {
          if (heroData.floats.length >= 6) return; // máximo 6 elementos
          const newFloats = [
            ...heroData.floats,
            { icon: "sparkles", text: "", color: "#F5DCE1" },
          ];
          setHeroData({ ...heroData, floats: newFloats });
        };

        const removeHeroFloat = (index) => {
          if (heroData.floats.length <= 1) return; // mínimo 1 elemento
          const newFloats = heroData.floats.filter((_, i) => i !== index);
          setHeroData({ ...heroData, floats: newFloats });
        };

        const saveProduct = async (f) => {
          if (!f.name || !f.price) {
            showToast("⚠ Completa nombre y precio");
            return;
          }
          await withSaving(async () => {
            const saved = await saveItem("products", f);
            const savedItem = f.id ? f : { ...f, id: saved?.id };
            setData((d) => ({
              ...d,
              products: f.id
                ? d.products.map((p) => (p.id === f.id ? savedItem : p))
                : [...d.products, savedItem],
            }));
            showToast(f.id ? "✓ Producto actualizado" : "✓ Producto agregado");
            setEditP(null);
            setShowFormP(false);
          });
        };

        const delProduct = async (id) => {
          if (!confirm("¿Eliminar este producto?")) return;
          await withSaving(async () => {
            await saveItem("products", { id }, "delete");
            setData((d) => ({
              ...d,
              products: d.products.filter((p) => p.id !== id),
            }));
            showToast("Producto eliminado");
          });
        };

        const saveNews = async (f) => {
          if (!f.title) {
            showToast("⚠ El título es requerido");
            return;
          }
          await withSaving(async () => {
            const saved = await saveItem("news", f);
            const savedItem = f.id ? f : { ...f, id: saved?.id };
            setData((d) => ({
              ...d,
              news: f.id
                ? d.news.map((n) => (n.id === f.id ? savedItem : n))
                : [savedItem, ...d.news],
            }));
            showToast(f.id ? "✓ Noticia actualizada" : "✓ Noticia publicada");
            setEditN(null);
            setShowFormN(false);
          });
        };

        const delNews = async (id) => {
          if (!confirm("¿Eliminar esta noticia?")) return;
          await withSaving(async () => {
            await saveItem("news", { id }, "delete");
            setData((d) => ({ ...d, news: d.news.filter((n) => n.id !== id) }));
            showToast("Noticia eliminada");
          });
        };

        const closeForm = () => {
          setEditP(null);
          setEditN(null);
          setShowFormP(false);
          setShowFormN(false);
          setEditC(null);
          setShowFormC(false);
        };

        const saveCategory = async (f) => {
          if (!f.name) {
            showToast("⚠ El nombre es requerido");
            return;
          }
          await withSaving(async () => {
            const saved = await saveItem("categories", f);
            const savedItem = f.id ? f : { ...f, id: saved?.id };
            setCategoriesData((prev) =>
              f.id
                ? prev.map((c) => (c.id === f.id ? savedItem : c))
                : [...prev, savedItem],
            );
            setData((d) => ({
              ...d,
              categories: f.id
                ? d.categories.map((c) => (c.id === f.id ? savedItem : c))
                : [...d.categories, savedItem],
            }));
            showToast(
              f.id ? "✓ Categoría actualizada" : "✓ Categoría agregada",
            );
            setEditC(null);
            setShowFormC(false);
          });
        };

        const delCategory = async (id) => {
          if (!confirm("¿Eliminar esta categoría?")) return;
          await withSaving(async () => {
            await saveItem("categories", { id }, "delete");
            setCategoriesData((prev) => prev.filter((c) => c.id !== id));
            setData((d) => ({
              ...d,
              categories: d.categories.filter((c) => c.id !== id),
            }));
            showToast("Categoría eliminada");
          });
        };

        return h(
          "div",
          null,
          h("style", null, `@keyframes spin{to{transform:rotate(360deg)}}`),
          h(
            "nav",
            null,
            h(
              "div",
              { className: "nav-inner" },
              h(
                "div",
                { className: "nav-logo" },
                "Sweet",
                h("span", null, " Eden"),
              ),
              h(
                "div",
                { className: "nav-links" },
                h(
                  "button",
                  { className: "nav-btn", onClick: () => setPage("home") },
                  "← Ver sitio",
                ),
              ),
            ),
          ),
          h(
            "div",
            { className: "admin-wrap" },
            h(
              "div",
              { className: "admin-header" },
              h("div", { className: "admin-title" }, "Panel Admin"),
              tab === "products" || tab === "news"
                ? h(
                    "button",
                    {
                      className: "btn-save",
                      disabled: saving,
                      onClick: () => {
                        closeForm();
                        tab === "products"
                          ? setShowFormP(true)
                          : setShowFormN(true);
                      },
                    },
                    "+" + (tab === "products" ? " Producto" : " Noticia"),
                  )
                : null,
            ),
            h(
              "div",
              { className: "admin-tabs" },
              h(
                "button",
                {
                  className:
                    "admin-tab" + (tab === "products" ? " active" : ""),
                  onClick: () => {
                    setTab("products");
                    closeForm();
                  },
                },
                "Productos (" + products.length + ")",
              ),
              h(
                "button",
                {
                  className: "admin-tab" + (tab === "news" ? " active" : ""),
                  onClick: () => {
                    setTab("news");
                    closeForm();
                  },
                },
                "Noticias (" + news.length + ")",
              ),
              h(
                "button",
                {
                  className:
                    "admin-tab" + (tab === "settings" ? " active" : ""),
                  onClick: () => {
                    setTab("settings");
                    closeForm();
                  },
                },
                "Configuración",
              ),
            ),

            tab === "products" &&
              h(
                "div",
                null,
                (showFormP || editP) &&
                  h(
                    "div",
                    {
                      style: {
                        background: "var(--white)",
                        border: "1px solid var(--border)",
                        borderRadius: "var(--radius)",
                        padding: "1.25rem",
                        marginBottom: "1.25rem",
                      },
                    },
                    h(
                      "div",
                      {
                        style: {
                          fontSize: "14px",
                          fontWeight: "500",
                          color: "var(--warm)",
                          marginBottom: "1rem",
                        },
                      },
                      editP ? "Editar producto" : "Nuevo producto",
                    ),
                    h(ProductForm, {
                      item: editP,
                      onSave: saveProduct,
                      onCancel: closeForm,
                      saving,
                      categories: categoriesData,
                    }),
                  ),
                h(
                  "div",
                  { className: "admin-list" },
                  products.length === 0 &&
                    h(
                      "div",
                      { className: "empty" },
                      h(
                        "div",
                        { className: "empty-icon" },
                        h(Icon, {
                          name: "cake",
                          style: { width: "48px", height: "48px" },
                        }),
                      ),
                      h(
                        "div",
                        { className: "empty-text" },
                        "Sin productos aún",
                      ),
                    ),
                  products.map((p) =>
                    h(
                      "div",
                      { key: p.id, className: "admin-item" },
                      h(
                        "div",
                        { className: "admin-item-emoji" },
                        p.image_url
                          ? h("img", {
                              src: p.image_url,
                              style: {
                                width: "100%",
                                height: "100%",
                                objectFit: "cover",
                                borderRadius: "6px",
                              },
                              onError: (e) => {
                                e.target.style.display = "none";
                              },
                            })
                          : h(Icon, {
                              name: "cake",
                              style: { width: "24px", height: "24px" },
                            }),
                      ),
                      h(
                        "div",
                        { className: "admin-item-info" },
                        h("div", { className: "admin-item-name" }, p.name),
                        h(
                          "div",
                          { className: "admin-item-sub" },
                          p.category +
                            (p.featured ? " · ★ Favorito" : "") +
                            (p.soldOut ? " · Agotado" : ""),

                      ),
                      h(
                        "div",
                        { className: "admin-item-price" },
                        "$" + p.price,
                      ),
                      h(
                        "div",
                        { className: "admin-actions" },
                        h(
                          "button",
                          {
                            className: "btn-edit",
                            disabled: saving,
                            onClick: () => {
                              setEditP(p);
                              setShowFormP(true);
                            },
                          },
                          "Editar",
                        ),
                        h(
                          "button",
                          {
                            className: "btn-del",
                            disabled: saving,
                            onClick: () => delProduct(p.id),

                          "✕",
                        ),
                      ),
                    ),
                  ),
                ),
              ),

            tab === "news" &&
              h(
                "div",
                null,
                (showFormN || editN) &&
                  h(
                    "div",
                    {
                      style: {
                        background: "var(--white)",
                        border: "1px solid var(--border)",
                        borderRadius: "var(--radius)",
                        padding: "1.25rem",
                        marginBottom: "1.25rem",
                      },
                    },
                    h(
                      "div",
                      {
                        style: {
                          fontSize: "14px",
                          fontWeight: "500",
                          color: "var(--warm)",
                          marginBottom: "1rem",
                        },
                      },
                      editN ? "Editar noticia" : "Nueva noticia",

                    h(NewsForm, {

                      onSave: saveNews,
                      onCancel: closeForm,

                h(

                  { className: "admin-list" },
                  news.length === 0 &&

                      { className: "empty" },
                      h(
                        "div",
                        { className: "empty-icon" },
                        h(Icon, {
                          name: "document",
                          style: { width: "48px", height: "48px" },
                        }),
                      ),
                      h("div", { className: "empty-text" }, "Sin noticias aún"),
                    ),
                  news.map((n) =>
                    h(
                      "div",
                      { key: n.id, className: "admin-item" },
                      h(
                        "div",
                        { className: "admin-item-emoji" },
                        h(Icon, {
                          name: "document",
                          style: { width: "20px", height: "20px" },
                        }),
                      ),
                      h(
                        "div",
                        { className: "admin-item-info" },
                        h("div", { className: "admin-item-name" }, n.title),
                        h(
                          "div",
                          { className: "admin-item-sub" },
                          formatDate(n.date),
                        ),
                      ),
                      h(
                        "div",
                        { className: "admin-actions" },
                        h(
                          "button",
                          {
                            className: "btn-edit",
                            disabled: saving,
                            onClick: () => {
                              setEditN(n);
                              setShowFormN(true);
                            },
                          },
                          "Editar",
                        ),
                        h(
                          "button",

                          "✕",

                      border: "1px solid var(--border)",
                      borderRadius: "var(--radius)",
                      padding: "1.25rem",
                      marginBottom: "1.25rem",
                    },
                  },
                  h(
                    "div",
                    {
                      style: {
                        fontSize: "14px",
                        fontWeight: "500",
                        color: "var(--warm)",
                        marginBottom: "1rem",
                      },
                    },
                    "Configuración de Contacto",
                  ),
                  h(
                    "div",
                    { className: "form-group" },
                    h(
                      "label",
                      { className: "form-label" },
                      "Número de WhatsApp",
                    ),

      // ── ROOT APP ──────────────────────────────────────────────────
      function App() {
        const [page, setPage] = useState("home");
        const [data, setData] = useState(null); // null = cargando
        const [error, setError] = useState("");

        useEffect(() => {
          loadData()
            .then((d) =>
              setData({
                whatsappNumber: DEFAULT_WHATSAPP,
                products: [],
                news: [],
                categories: [],
                hero: DEFAULT_HERO,
                ...d,
              }),
            )
            .catch(() => setError("No se pudo conectar con la base de datos."));
        }, []);

        if (error)
          return h(
            "div",
            {
              style: {
                textAlign: "center",
                padding: "4rem 1rem",
                color: "#C9667A",
                fontSize: "14px",
              },
            },
            h(
              "div",
              { style: { fontSize: "2rem", marginBottom: "1rem" } },
              "⚠️",
            ),
            error,
          );
        if (!data)
          return h(
            "div",
            null,
            h("style", null, "@keyframes spin{to{transform:rotate(360deg)}}"),
            h(Spinner),
          );

        if (page === "login") return h(Login, { setPage });
        if (page === "admin") return h(Admin, { data, setData, setPage });
        return h(PublicSite, {
          products: data.products || [],
          news: data.news || [],
          whatsappNumber: data.whatsappNumber || DEFAULT_WHATSAPP,
          hero: data.hero || DEFAULT_HERO,
          setPage,
          categories: data.categories || [],
        });
      }
      ReactDOM.createRoot(document.getElementById("app")).render(h(App));
